<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>편의점 앱</title>

<style>
body{
    margin:0;
    background:#87CEEB;
    font-family:Arial;
}

.store{
    width:100%;
    height:100vh;
    position:relative;
    overflow:hidden;
    background:linear-gradient(#8fd3ff,#d7f4ff);
}

.shop{
    position:absolute;
    bottom:100px;
    left:50%;
    transform:translateX(-50%);
    width:500px;
    height:250px;
    background:white;
    border:5px solid #444;
}

.sign{
    height:50px;
    background:#00c853;
    color:white;
    text-align:center;
    line-height:50px;
    font-size:30px;
    font-weight:bold;
}

.door{
    width:100px;
    height:150px;
    background:#9fdcff;
    position:absolute;
    bottom:0;
    left:200px;
}

.person{
    position:absolute;
    bottom:20px;
    width:30px;
    height:60px;
    background:#ff9800;
    border-radius:10px;
    animation:walk 4s linear infinite alternate;
}

.person::before{
    content:"";
    width:30px;
    height:30px;
    border-radius:50%;
    background:#ffd180;
    position:absolute;
    top:-25px;
}

.p2{
    left:100px;
    animation-duration:3s;
    background:#42a5f5;
}

.p3{
    left:200px;
    animation-duration:5s;
    background:#ec407a;
}

.p4{
    left:300px;
    animation-duration:2.5s;
    background:#66bb6a;
}

@keyframes walk{
    from{
        transform:translateX(-200px);
    }
    to{
        transform:translateX(200px);
    }
}

button{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    padding:18px 40px;
    font-size:22px;
    border:none;
    border-radius:15px;
    background:#ff5252;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff1744;
}
</style>

</head>
<body>

<div class="store">

<div class="shop">
<div class="sign">24시 편의점</div>

<div class="door"></div>

<div class="person"></div>
<div class="person p2"></div>
<div class="person p3"></div>
<div class="person p4"></div>

</div>

<button onclick="startApp()">시작하기</button>

</div>

<script>
function playBell(){

const ctx = new (window.AudioContext || window.webkitAudioContext)();

function bell(freq,time){
const osc = ctx.createOscillator();
const gain = ctx.createGain();

osc.frequency.value=freq;
osc.type="triangle";

osc.connect(gain);
gain.connect(ctx.destination);

gain.gain.setValueAtTime(0.2,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+time);

osc.start();
osc.stop(ctx.currentTime+time);
}

bell(880,0.3);

setTimeout(()=>{
bell(1175,0.4);
},250);

}

function startApp(){

playBell();

alert("편의점에 입장합니다!");

}
</script>
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중2 과학 학습 앱</title>


</html>
