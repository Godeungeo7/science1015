<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Science</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle at bottom,#001233,#000814,#000);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* 별 */
.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%,100%{
opacity:.2;
transform:scale(1);
}
50%{
opacity:1;
transform:scale(1.5);
}
}

/* 은하 */
.nebula{
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#4f46e5aa,#7c3aed44,transparent);
filter:blur(70px);
animation:rotate 30s linear infinite;
}

@keyframes rotate{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

.container{
z-index:5;
text-align:center;
color:white;
}

h1{
font-size:70px;
letter-spacing:5px;
text-shadow:0 0 20px cyan;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 20px cyan;
}
to{
text-shadow:0 0 50px #00f7ff;
}
}

p{
margin-top:20px;
font-size:22px;
opacity:.8;
}

button{
margin-top:50px;
padding:18px 60px;
font-size:22px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#00e5ff,#8a2be2);
color:white;
cursor:pointer;
transition:.3s;
box-shadow:0 0 25px cyan;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 50px cyan;
}

.shooting-star{
position:absolute;
width:3px;
height:120px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:shoot 5s linear infinite;
}

@keyframes shoot{
0%{
top:-100px;
left:-100px;
opacity:1;
}
100%{
top:120%;
left:120%;
opacity:0;
}
}
</style>

</head>

<body>

<div class="nebula"></div>

<div class="container">
<h1>SPACE SCIENCE</h1>
<p>Explore the Universe</p>

<button onclick="startApp()">
🚀 시작하기
</button>
</div>

<div class="shooting-star"></div>

<script>

// 별 250개 생성
for(let i=0;i<250;i++){

const star=document.createElement("div");

star.className="star";

const size=Math.random()*3+1;

star.style.width=size+"px";
star.style.height=size+"px";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
star.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(star);

}

// 버튼
function startApp(){

document.body.style.transition="1s";
document.body.style.background="#000";

setTimeout(()=>{
alert("🚀 우주 탐험을 시작합니다!");
},800);

}

</script>

</body>
</html>
