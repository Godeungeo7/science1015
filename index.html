<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👽 재경이의 방 👽</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
overflow:hidden;
height:100vh;
background:linear-gradient(#000010,#12003f,#25005a);
font-family:"Comic Sans MS","Malgun Gothic",sans-serif;
cursor:crosshair;
}

/* 별 */
.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

/* 가운데 */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:50;
}

h1{
color:white;
font-size:42px;
text-shadow:4px 4px hotpink;
animation:shake .4s infinite alternate;
}

@keyframes shake{
from{transform:rotate(-1deg);}
to{transform:rotate(1deg);}
}

button{
margin-top:30px;
padding:18px 45px;
font-size:22px;
background:yellow;
border:none;
border-radius:50px;
cursor:pointer;
box-shadow:5px 5px orange;
animation:rainbow 3s infinite;
transition:.2s;
}

button:hover{
transform:scale(1.1) rotate(-5deg);
}

@keyframes rainbow{
0%{background:#ff0;}
25%{background:#0ff;}
50%{background:#f0f;}
75%{background:#0f0;}
100%{background:#ff0;}
}

/* 행성 */
#planet{
position:absolute;
left:70%;
top:15%;
font-size:90px;
transition:.2s;
animation:float 4s infinite ease-in-out;
}

/* 외계인 */
#alien{
position:absolute;
left:12%;
top:65%;
font-size:70px;
cursor:pointer;
animation:alien 3s infinite;
}

@keyframes alien{
50%{transform:translateY(-25px);}
}

/* UFO */
#ufo{
position:absolute;
top:8%;
left:-200px;
font-size:60px;
animation:ufo 15s linear infinite;
}

@keyframes ufo{
to{
left:120%;
}
}

/* 유성 */
.meteor{
position:absolute;
color:white;
font-size:22px;
animation:meteor 2s linear forwards;
}

@keyframes meteor{
to{
transform:translate(-700px,700px);
opacity:0;
}
}

/* XP창 */
#loading{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
z-index:999;
}

.window{
width:320px;
background:#ece9d8;
border:3px solid #245edb;
font-family:tahoma;
}

.title{
background:#245edb;
color:white;
padding:8px;
font-weight:bold;
}

.content{
padding:25px;
text-align:center;
font-size:18px;
}

progress{
width:90%;
height:20px;
}
</style>

</head>

<body>

<div id="planet">🪐</div>

<div id="alien">👽</div>

<div id="ufo">🛸</div>

<div class="center">

<h1>
안녕하세요!<br>
재경이의 방에<br>
오신 걸 환영합니다!
</h1>

<button onclick="startRoom()">
🚀 시작하기
</button>

</div>

<div id="loading">

<div class="window">

<div class="title">
Windows XP
</div>

<div class="content">

📡 삐빅... 접속 중...

<br><br>

<progress></progress>

</div>

</div>

</div>

<script>

/* 별 200개 */

for(let i=0;i<200;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDuration=(Math.random()*3+1)+"s";

document.body.appendChild(s);

}

/* 별 커서 */

document.addEventListener("mousemove",e=>{

let star=document.createElement("div");

star.innerHTML="⭐";

star.style.position="absolute";

star.style.left=e.pageX+"px";

star.style.top=e.pageY+"px";

star.style.pointerEvents="none";

star.style.fontSize="12px";

document.body.appendChild(star);

setTimeout(()=>star.remove(),500);

});

/* 행성 마우스 따라오기 */

const planet=document.getElementById("planet");

document.addEventListener("mousemove",e=>{

planet.style.left=e.clientX/10+"px";

planet.style.top=e.clientY/10+"px";

});

/* 외계인 도망 */

const alien=document.getElementById("alien");

alien.onclick=()=>{

beep();

alien.innerHTML="🏃‍♂️💨";

alien.style.transition="1s";

alien.style.transform="translate(1800px,-900px) rotate(720deg)";

};

/* 유성 */

setInterval(()=>{

let m=document.createElement("div");

m.className="meteor";

m.innerHTML="☄️";

m.style.left=Math.random()*window.innerWidth+"px";

m.style.top="-50px";

document.body.appendChild(m);

setTimeout(()=>m.remove(),2000);

},2500);

/* 삐용 효과음 */

function beep(){

const ctx=new(window.AudioContext||window.webkitAudioContext)();

const osc=ctx.createOscillator();

osc.type="triangle";

osc.frequency.value=900;

osc.connect(ctx.destination);

osc.start();

osc.stop(ctx.currentTime+0.15);

}

/* 시작하기 */

function startRoom(){

beep();

document.getElementById("loading").style.display="flex";

setTimeout(()=>{

document.getElementById("loading").style.display="none";

alert("👽 접속 성공!\n재경이의 방에 오신 걸 환영합니다!");

},3000);

}

</script>

</body>
</html>
