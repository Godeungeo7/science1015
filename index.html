<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>편의점 게임</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:'Arial';
}

.store{
    width:100vw;
    height:100vh;
    background:linear-gradient(#8dd7ff,#dff7ff);
    position:relative;
}

/* 편의점 */
.shop{
    position:absolute;
    width:600px;
    height:320px;
    background:white;
    border:8px solid #444;
    left:50%;
    top:50%;
    transform:translate(-50%,-55%);
}

.sign{
    height:70px;
    background:#00b050;
    color:white;
    font-size:35px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

.window{
    display:flex;
    justify-content:space-around;
    margin-top:30px;
}

.glass{
    width:180px;
    height:180px;
    background:#bdefff;
    border:4px solid #888;
}

.door{
    width:100px;
    height:220px;
    background:#bdefff;
    border:4px solid #888;
}

/* 사람 */

.person{
    width:30px;
    height:80px;
    position:absolute;
    bottom:40px;
}

.head{
    width:28px;
    height:28px;
    background:#ffd7b5;
    border-radius:50%;
    margin:auto;
}

.body{
    width:20px;
    height:45px;
    background:#3366ff;
    margin:auto;
}

.walk1{
    animation:walk1 9s linear infinite;
}

.walk2{
    animation:walk2 12s linear infinite;
}

.walk3{
    animation:walk3 8s linear infinite;
}

@keyframes walk1{
    from{left:-60px;}
    to{left:110%;}
}

@keyframes walk2{
    from{left:110%;}
    to{left:-60px;}
}

@keyframes walk3{
    from{left:-100px;}
    to{left:110%;}
}

/* 버튼 */

.startBtn{
    position:absolute;
    left:50%;
    bottom:60px;
    transform:translateX(-50%);
    padding:18px 45px;
    font-size:28px;
    border:none;
    border-radius:15px;
    background:#ff4444;
    color:white;
    cursor:pointer;
    transition:.2s;
}

.startBtn:hover{
    transform:translateX(-50%) scale(1.08);
}

#message{
    position:absolute;
    top:30px;
    width:100%;
    text-align:center;
    font-size:45px;
    color:white;
    font-weight:bold;
    text-shadow:2px 2px 8px black;
}
</style>
</head>

<body>

<div class="store">

<div id="message"></div>

<div class="shop">

<div class="sign">
24 편의점
</div>

<div class="window">
<div class="glass"></div>
<div class="door"></div>
<div class="glass"></div>
</div>

</div>

<div class="person walk1">
<div class="head"></div>
<div class="body"></div>
</div>

<div class="person walk2" style="bottom:20px;">
<div class="head"></div>
<div class="body" style="background:red;"></div>
</div>

<div class="person walk3" style="bottom:60px;">
<div class="head"></div>
<div class="body" style="background:green;"></div>
</div>

<button class="startBtn" onclick="startGame()">
시작하기
</button>

</div>

<!-- 효과음 -->
<audio id="bell">
<source src="bell.mp3" type="audio/mpeg">
</audio>

<script>

function startGame(){

document.getElementById("bell").play();

document.getElementById("message").innerHTML="🎮 게임 시작!";function startGame() {

    // 효과음 재생
    const bell = document.getElementById("bell");
    bell.currentTime = 0;
    bell.play();

    // 버튼 글자 없애기
    const btn = document.querySelector(".startBtn");
    btn.textContent = "";

    // 버튼도 같이 없애고 싶으면 아래 한 줄 사용
    // btn.style.display = "none";

    // 게임 시작 메시지
    document.getElementById("message").innerHTML = "🎮 게임 시작!";
}

}

</script>

</body>
</html>
